<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chord Builder</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
  <script src="https://unpkg.com/tonal@5.1.3/browser/tonal.min.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>Chord Builder</h1>
      <p class="tagline">Build, play, and arrange chord progressions</p>
    </header>

    <main>
      <section class="progression-section">
        <div class="section-header">
          <h2>Progression</h2>
          <div class="progression-controls">
            <button id="add-chord-btn" class="btn btn-secondary">+ Add Chord</button>
            <button id="play-all-btn" class="btn btn-primary">▶ Play All</button>
            <button id="stop-btn" class="btn btn-secondary" disabled>⏹ Stop</button>
          </div>
        </div>
        <div id="chord-list" class="chord-list"></div>
        <p class="hint">Drag cards to reorder &middot; click a card to edit it &middot; hover for delete &middot; <kbd>Space</kbd> to play/stop</p>
      </section>

      <section class="editor-section">
        <div class="section-header">
          <h2>Editor</h2>
          <div class="editor-controls">
            <button id="play-chord-btn" class="btn btn-primary">▶ Play This Chord</button>
            <button id="clear-notes-btn" class="btn btn-secondary">Clear Notes</button>
          </div>
        </div>

        <div class="piano-wrapper">
          <div class="piano" id="piano"></div>
        </div>

        <div class="chord-info">
          <div class="info-row">
            <label>Notes <span class="muted">(max 6)</span>:</label>
            <span id="notes-display" class="value mono">&mdash;</span>
          </div>
          <div class="info-row">
            <label>Detected:</label>
            <span id="detected-display" class="value mono accent">&mdash;</span>
          </div>
          <div class="info-row">
            <label for="custom-name">Custom name:</label>
            <input type="text" id="custom-name" placeholder="(uses detected name)" maxlength="40" />
          </div>
          <div class="info-row">
            <label for="duration">Duration:</label>
            <input type="number" id="duration" min="0.1" max="10" step="0.1" value="1.0" />
            <span class="value muted">seconds</span>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>Built with <a href="https://tonejs.github.io" target="_blank" rel="noopener">Tone.js</a> and <a href="https://github.com/tonaljs/tonal" target="_blank" rel="noopener">Tonal.js</a></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
